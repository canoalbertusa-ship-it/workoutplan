<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Body Recomp Training Dashboard</title>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6f8;
}

header{
background:#1f2937;
color:white;
padding:20px;
text-align:center;
}

.tabs{
display:flex;
flex-wrap:wrap;
background:#e5e7eb;
}

.tab{
padding:12px 18px;
cursor:pointer;
border-right:1px solid #d1d5db;
}

.tab.active{
background:white;
font-weight:bold;
}

.week{
display:none;
padding:20px;
}

.week.active{
display:block;
}

.day{
background:white;
padding:18px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.day h3{
margin-top:0;
}

.exercise{
margin:6px 0;
}

.bottom{
margin-top:10px;
border-top:1px solid #e5e7eb;
padding-top:10px;
}

.recovery{
margin-top:10px;
font-size:14px;
color:#374151;
background:#f9fafb;
padding:8px;
border-radius:6px;
}

@media print{
.tabs{display:none;}
}
</style>

</head>
<body>

<header>
<h1>Body Recomp Training Dashboard</h1>
<p>March 9 – May 3</p>
<p><b>Focus:</b> Upper Chest • Lateral Delts • Upper Lats</p>
</header>

<div class="tabs" id="tabs"></div>

<div id="weeks"></div>

<script>

const weeks = [

{
name:"Week 1 (Mar 9–15)",
days:[
{
title:"Monday — Upper Strength",
ex:[
"Bench Press — 4 x 5 @ 175",
"Incline Bench — 4 x 6 @ 135",
"Barbell Row — 4 x 6 @ 95",
"Lat Pulldown — 4 x 8 @ 90",
"Dumbbell Shoulder Press — 3 x 8 @ 40",
"Skull Crushers — 3 x 10 @ 60"
],
rec:"Sauna evening 15–20 min • Cold optional morning 2–5 min"
},
{
title:"Tuesday — Lower Strength",
ex:[
"Back Squat — 4 x 5 @ 145",
"Deadlift — 3 x 5 @ 145",
"Walking Lunges — 3 x 10 each leg",
"Leg Curl — 3 x 10",
"Standing Calf Raise — 4 x 12",
"Planks — 3 x 45 sec"
],
rec:"Sauna evening 15–20 min • Cold morning 2–5 min"
},
{
title:"Wednesday — Active Recovery",
ex:[
"Steps 8,000–12,000",
"Mobility / Stretching"
],
rec:"Cold morning 3–5 min • Sauna evening 15–20 min"
},
{
title:"Thursday — Upper Aesthetic",
ex:[
"Incline Dumbbell Press — 4 x 10",
"Cable Fly — 3 x 12",
"Wide Grip Lat Pulldown — 4 x 10",
"Seated Cable Row — 3 x 10",
"Lateral Raises — 4 x 12–15",
"EZ Bar Curl — 3 x 10",
"Tricep Pushdowns — 3 x 12"
],
rec:"Sauna evening 15–20 min • Cold morning optional"
},
{
title:"Friday — Lower Posterior Chain",
ex:[
"Romanian Deadlift — 4 x 8",
"Front or Goblet Squat — 3 x 10",
"Hip Thrust — 3 x 10",
"Leg Extension — 3 x 12",
"Seated Calf Raise — 4 x 12",
"Hanging Knee Raises — 3 x 12"
],
rec:"Sauna evening 15–20 min • Cold morning optional"
},
{
title:"Saturday — Conditioning / Core",
ex:[
"Row Machine — 3 min",
"Kettlebell Swings — 15",
"Pushups — 15",
"Air Squats — 20",
"Repeat 4 rounds"
],
rec:"Cold after workout optional • Sauna evening optional"
},
{
title:"Sunday — Rest",
ex:["Rest","Focus on recovery and sleep"],
rec:"Cold morning 3–5 min • Sauna evening 15–20 min"
}
]
}

];

const tabs=document.getElementById("tabs");
const weeksDiv=document.getElementById("weeks");

function save(){
localStorage.setItem("workoutTracker",
JSON.stringify([...document.querySelectorAll("input")].map(i=>i.checked)));
}

function load(){
const data=JSON.parse(localStorage.getItem("workoutTracker")||"[]");
document.querySelectorAll("input").forEach((el,i)=>{
if(data[i]) el.checked=true;
});
}

function build(){

weeks.forEach((week,w)=>{

const tab=document.createElement("div");
tab.className="tab";
tab.innerText=week.name;
tab.onclick=()=>showWeek(w);
tabs.appendChild(tab);

const weekDiv=document.createElement("div");
weekDiv.className="week";

week.days.forEach((day,d)=>{

const card=document.createElement("div");
card.className="day";

const h=document.createElement("h3");
h.innerText=day.title;
card.appendChild(h);

day.ex.forEach(e=>{
const div=document.createElement("div");
div.className="exercise";
div.innerHTML=`<label><input type="checkbox"> ${e}</label>`;
card.appendChild(div);
});

const bottom=document.createElement("div");
bottom.className="bottom";

bottom.innerHTML=`
<label><input type="checkbox"> Workout Completed</label><br>
<label><input type="checkbox"> Supplements Taken</label>
`;

card.appendChild(bottom);

const rec=document.createElement("div");
rec.className="recovery";
rec.innerText=day.rec;
card.appendChild(rec);

weekDiv.appendChild(card);

});

weeksDiv.appendChild(weekDiv);

});

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("change",save);
});

showWeek(0);
load();
}

function showWeek(i){
document.querySelectorAll(".tab").forEach((t,n)=>{
t.classList.toggle("active",n===i);
});
document.querySelectorAll(".week").forEach((w,n)=>{
w.classList.toggle("active",n===i);
});
}

build();

</script>

</body>
</html>
